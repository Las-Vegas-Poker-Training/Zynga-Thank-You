<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynga: Gangsters & Gaming</title>
    <style>
        :root {
            --zynga-red: #D60405;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            opacity: 0.7;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        .video-wrapper {
            position: relative;
            z-index: 10;
            width: 350px; 
            height: 622px;
            border: 3px solid var(--zynga-red);
            box-shadow: 0 0 40px rgba(214, 4, 5, 0.5);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-in-out;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #overlay, #end-screen {
            position: absolute;
            z-index: 20;
            text-align: center;
            width: 100%;
        }

        #end-screen {
            display: none;
            opacity: 0;
            background: rgba(0,0,0,0.8);
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none; /* Controlled by JS */
        }

        .btn-action {
            background: var(--zynga-red);
            border: none;
            color: white;
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s;
        }

        .btn-action:active { transform: translateY(2px); }

        /* Newspaper Style Button */
        .newspaper-btn {
            background: #f0ebe0;
            color: #111;
            border: 2px solid #333;
            padding: 15px 25px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            box-shadow: 5px 5px 0px #333;
            cursor: pointer;
            font-family: 'Times New Roman', serif;
            font-size: 1.2rem;
        }

        .newspaper-btn:hover { background: #fff; }

        @keyframes glitch-fx {
            0% { transform: translate(0); filter: brightness(1); }
            20% { transform: translate(-15px, 5px); filter: hue-rotate(90deg) brightness(2); }
            40% { transform: translate(15px, -5px); }
            100% { transform: translate(0); }
        }

        .glitch-active { animation: glitch-fx 0.3s infinite; }

    </style>
</head>
<body>

    <div id="particle-container"></div>

    <div class="video-wrapper" id="stage">
        <div id="overlay">
            <h1 style="color: var(--zynga-red); letter-spacing: 3px; margin:0;">ZYNGA</h1>
            <p style="margin-bottom: 20px;">GANGSTERS & GAMING</p>
            <button class="btn-action" onclick="initSequence()">ENTER THE HEIST</button>
        </div>

        <div id="end-screen">
            <p style="font-family: 'Times New Roman', serif; color: #f0ebe0; font-size: 1.1rem; margin-bottom: 10px;">LATEST NEWS</p>
            <button class="newspaper-btn" onclick="restartWithBang()">REWATCH THE FOOTAGE</button>
        </div>
        
        <video id="zyngaVideo" playsinline>
            <source src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69cb770d8e23956e3fd917f1.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="cockingSfx" src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/693a37aee03e9d619cc2d3f2.mp3"></audio>
    <audio id="tommySfx" src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/693a3785eac0a871eee5add2.mp3"></audio>

    <script>
        const assets = [
            'https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69cb7896b7f7cd2dbb5e624b.png', // Poker Chip
            'https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69a761d3b86978c8aea7c942.png', // Card Back
            'https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69a761d34cf199e1842ca73a.png'  // Updated Ace of Spades
        ];

        function createParticles() {
            const container = document.getElementById('particle-container');
            for (let i = 0; i < 50; i++) { // Increased density
                const img = document.createElement('img');
                img.src = assets[Math.floor(Math.random() * assets.length)];
                img.className = 'particle';
                
                const size = Math.random() * 70 + 30;
                img.style.width = `${size}px`;
                img.style.left = `${Math.random() * 100}vw`;
                img.style.top = `${Math.random() * 100}vh`;
                
                container.appendChild(img);
                animateParticle(img);
            }
        }

        function animateParticle(el) {
            const duration = Math.random() * 15000 + 10000;
            const xDest = (Math.random() - 0.5) * 600;
            const yDest = (Math.random() - 0.5) * 600;

            el.animate([
                { transform: 'translate(0, 0) rotate(0deg)' },
                { transform: `translate(${xDest}px, ${yDest}px) rotate(${Math.random() * 1080}deg)` }
            ], {
                duration: duration,
                iterations: Infinity,
                direction: 'alternate',
                easing: 'ease-in-out'
            });
        }

        function initSequence() {
            const video = document.getElementById('zyngaVideo');
            const cocking = document.getElementById('cockingSfx');
            const stage = document.getElementById('stage');
            const overlay = document.getElementById('overlay');

            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
            
            // Play cocking sound first
            cocking.play();

            // Only start video when audio finishes
            cocking.onended = () => {
                stage.classList.add('glitch-active');
                
                setTimeout(() => {
                    stage.classList.remove('glitch-active');
                    video.style.display = 'block';
                    video.play();
                }, 600);
            };
        }

        const video = document.getElementById('zyngaVideo');
        video.onended = () => {
            // Cinematic fade out
            video.style.transition = "opacity 2s";
            video.style.opacity = "0";
            
            setTimeout(() => {
                video.style.display = 'none';
                const endScreen = document.getElementById('end-screen');
                endScreen.style.display = 'flex';
                setTimeout(() => endScreen.style.opacity = "1", 100);
            }, 2000);
        };

        function restartWithBang() {
            const tommy = document.getElementById('tommySfx');
            tommy.play();
            
            // Visual feedback of the shot
            document.body.style.backgroundColor = "white";
            
            // Reload after the gunfire is well underway
            setTimeout(() => {
                location.reload();
            }, 1200);
        }

        createParticles();
    </script>
</body>
</html>
